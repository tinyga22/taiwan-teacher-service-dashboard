<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>新簽 SOP 質檢看板</title>
  <style>
    :root {
      --bg: #f5f7f7;
      --panel: #ffffff;
      --text: #1d2b31;
      --muted: #6a767c;
      --line: rgba(28, 50, 58, .10);
      --green: #1f7a63;
      --green-2: #e9f5f1;
      --blue: #286f9f;
      --orange: #c9792b;
      --red: #b84b4b;
      --shadow: 0 18px 44px rgba(26, 42, 52, .08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
    .wrap { max-width: 1440px; margin: 0 auto; padding: 0 22px 48px; }
    .hero { border-radius: 22px; padding: 26px 28px; background: linear-gradient(135deg, #206b60, #2c8a78); color: #fff; box-shadow: var(--shadow); }
    .hero-grid { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 24px; align-items: end; }
    h1 { margin: 0; font-size: 30px; line-height: 1.18; letter-spacing: 0; }
    .sub { margin-top: 10px; color: rgba(255,255,255,.88); font-size: 14px; line-height: 1.8; max-width: 920px; }
    .hero-pill { display: inline-flex; align-items: center; padding: 10px 14px; border-radius: 999px; background: rgba(255,255,255,.14); font-size: 13px; white-space: nowrap; }
    .section { margin-top: 18px; background: var(--panel); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); overflow: hidden; }
    .section-head { padding: 20px 22px 0; }
    .section-head h2 { margin: 0; font-size: 20px; }
    .section-head p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .metrics { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; padding: 18px 22px 22px; }
    .metric { border: 1px solid var(--line); border-radius: 16px; padding: 16px; background: linear-gradient(180deg, #fff, #fbfcfc); min-height: 118px; }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { margin-top: 10px; font-size: 28px; font-weight: 800; letter-spacing: 0; }
    .metric .note { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .metric.good .value { color: var(--green); }
    .metric.warn .value { color: var(--orange); }
    .metric.bad .value { color: var(--red); }
    .toolbar { display: grid; grid-template-columns: 220px 220px minmax(260px, 1fr); gap: 12px; padding: 18px 22px 22px; align-items: end; }
    label { display: block; margin-bottom: 7px; font-size: 12px; font-weight: 700; color: var(--muted); }
    select, input { width: 100%; border: 1px solid rgba(31, 122, 99, .18); border-radius: 999px; padding: 12px 16px; font: inherit; background: #fff; color: var(--text); outline: none; }
    input { border-radius: 14px; }
    .table-wrap { padding: 0 22px 22px; overflow-x: auto; }
    table { width: 100%; min-width: 980px; border-collapse: collapse; }
    th, td { padding: 13px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 13px; }
    th { background: #f8fbfa; color: var(--muted); font-size: 12px; position: sticky; top: 0; z-index: 1; }
    .rate { font-weight: 800; color: var(--green); }
    .rate.low { color: var(--red); }
    .rate.mid { color: var(--orange); }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { display: inline-flex; padding: 7px 9px; border-radius: 999px; background: var(--green-2); color: var(--green); font-size: 12px; font-weight: 700; }
    .chip.red { background: #faeeee; color: var(--red); }
    .chip.orange { background: #fff4e8; color: var(--orange); }
    .text-cell { max-width: 360px; color: #34444a; line-height: 1.6; }
    .split { display: grid; grid-template-columns: 1.1fr .9fr; gap: 18px; }
    .analysis { padding: 18px 22px 22px; color: #34444a; line-height: 1.85; font-size: 14px; }
    .analysis p { margin: 0 0 10px; }
    .analysis b { color: var(--text); }
    @media (max-width: 1100px) {
      .hero-grid, .split { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="section">
      <div class="section-head">
        <h2>整體完成情況</h2>
        <p>自我介紹需同時具備文字、照片、視頻/文件；首視邀約與課前提醒單獨統計；若首視邀約後 48 小時內家長未回覆，才觸發二次邀約檢查。</p>
      </div>
      <div class="metrics" id="metrics"></div>
    </section>

    <div class="split">
      <section class="section">
        <div class="section-head"><h2>數據分析</h2></div>
        <div class="analysis" id="analysis"></div>
      </section>
      <section class="section">
        <div class="section-head"><h2>未匹配學員</h2><p>這部分暫列為異常，不建議直接算老師未完成。</p></div>
        <div class="table-wrap"><table id="unmatchedTable"></table></div>
      </section>
    </div>

    <section class="section">
      <div class="section-head"><h2>老師完成情況</h2><p>可先看全項完成率，再拆看各個 SOP 動作的短板。</p></div>
      <div class="table-wrap"><table id="teacherTable"></table></div>
    </section>

    <section class="section">
      <div class="section-head"><h2>老師自查明細</h2><p>篩選老師或問題類型後，可查看未完成學員與已命中的聊天內容。</p></div>
      <div class="toolbar">
        <div><label>老師</label><select id="teacherFilter"></select></div>
        <div><label>問題類型</label><select id="issueFilter"></select></div>
        <div><label>搜尋學員 ID / 姓名</label><input id="searchInput" placeholder="輸入學員 ID 或姓名"></div>
      </div>
      <div class="table-wrap"><table id="detailTable"></table></div>
    </section>
  </div>

        </tr>
      `).join('');
      document.getElementById('teacherTable').innerHTML = head + body;
    }

    function renderUnmatched() {
      const rows = unmatched.slice(0, 80).map(r => `
        <tr><td>${esc(r.student_id)}</td><td>${esc(r.student_name)}</td><td>${esc(r.class_start_dt)}</td><td>${esc(r.attendance)}</td><td>${esc(r.teacher_alias)}</td><td>${esc(r.week)}</td></tr>
      `).join('');
      document.getElementById('unmatchedTable').innerHTML = '<tr><th>學員ID</th><th>姓名</th><th>首課時間</th><th>考勤</th><th>老師</th><th>周次</th></tr>' + rows;
    }

    function initFilters() {
      const teacherFilter = document.getElementById('teacherFilter');
      const issueFilter = document.getElementById('issueFilter');
      const teacherNames = Array.from(new Set(details.map(d => d.teacher_alias).filter(Boolean))).sort();
      teacherFilter.innerHTML = '<option value="">全部老師</option>' + teacherNames.map(x => `<option value="${esc(x)}">${esc(x)}</option>`).join('');
      issueFilter.innerHTML = [
        ['','全部問題'],
        ['not_done','未全項完成'],
        ['line_missing','LINE未匹配'],
        ['intro','自我介紹未完成'],
        ['video','首視邀約未完成'],
        ['second','二次邀約未完成'],
        ['preclass','課前提醒未完成']
      ].map(([v,t]) => `<option value="${v}">${t}</option>`).join('');
      teacherFilter.addEventListener('change', renderDetails);
      issueFilter.addEventListener('change', renderDetails);
      document.getElementById('searchInput').addEventListener('input', renderDetails);
    }

    function rowMatchesIssue(row, issue) {
      if (!issue) return true;
      if (issue === 'not_done') return row.new_signup_sop_done !== '1';
      if (issue === 'line_missing') return row.line_student_matched !== '1';
      if (issue === 'intro') return row.intro_done !== '1';
      if (issue === 'video') return row.video_invite_done !== '1';
      if (issue === 'second') return row.second_invite_required === '1' && row.second_invite_done !== '1';
      if (issue === 'preclass') return row.preclass_notice_done !== '1';
      return true;
    }

    function renderDetails() {
      const teacher = document.getElementById('teacherFilter').value;
      const issue = document.getElementById('issueFilter').value;
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered = details.filter(row => {
        if (teacher && row.teacher_alias !== teacher) return false;
        if (!rowMatchesIssue(row, issue)) return false;
        if (q && !(`${row.student_id} ${row.student_name}`.toLowerCase().includes(q))) return false;
        return true;
      }).slice(0, 220);
      const rows = filtered.map(row => `
        <tr>
          <td>${esc(row.student_id)}<br><b>${esc(row.student_name)}</b></td>
          <td>${esc(row.teacher_alias)}<br>${esc(row.class_start_dt)}</td>
          <td><div class="chips">
            <span class="chip ${row.intro_text_done === '1' ? '' : 'red'}">文字</span>
            <span class="chip ${row.intro_photo_done === '1' ? '' : 'red'}">照片</span>
            <span class="chip ${row.intro_video_file_done === '1' ? '' : 'red'}">視頻/文件</span>
            <span class="chip ${row.video_invite_done === '1' ? '' : 'red'}">首視</span>
            <span class="chip ${row.preclass_notice_done === '1' ? '' : 'red'}">提醒</span>
          </div></td>
          <td class="text-cell">${esc(row.missing_items || '-')}<br><span style="color:#6a767c">${esc(row.issue_reason || '')}</span></td>
          <td class="text-cell">${esc(short(row.intro_message_text || row.video_invite_message_text || row.preclass_notice_message_text || '', 180))}</td>
        </tr>
      `).join('');
      document.getElementById('detailTable').innerHTML = '<tr><th>學員</th><th>老師 / 首課</th><th>命中項</th><th>未完成原因</th><th>命中文案摘錄</th></tr>' + rows;
    }

    renderMetrics();
    renderAnalysis();
    renderTeacherTable();
    renderUnmatched();
    initFilters();
    renderDetails();
  </script>
</body>
</html>
