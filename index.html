<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台灣老師服務質檢看板</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --panel: #ffffff;
      --hero: #1f6f63;
      --hero-soft: #2b8777;
      --text: #173038;
      --muted: #68767c;
      --line: rgba(19, 48, 56, 0.08);
      --soft: #eef4f1;
      --accent: #1d745f;
      --warn: #c56d1f;
      --track: #e8eeeb;
      --shadow: 0 18px 40px rgba(20, 37, 45, 0.06);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei","PingFang SC",sans-serif; color: var(--text); background: var(--bg); }
    .wrap { max-width: 1360px; margin: 0 auto; padding: 24px 20px 40px; }
    .hero { background: linear-gradient(135deg, var(--hero) 0%, var(--hero-soft) 100%); color: #fff; border-radius: 24px; padding: 28px; box-shadow: var(--shadow); }
    .hero-top { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; }
    h1 { margin: 0; font-size: 32px; line-height: 1.15; }
    .hero-sub { margin-top: 10px; font-size: 14px; line-height: 1.7; color: rgba(255,255,255,.88); max-width: 760px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    .pill { border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.12); color: #fff; padding: 10px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; }
    .section { margin-top: 18px; background: var(--panel); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow); }
    .section-head { padding: 22px 24px 0; }
    .section-head h2 { margin: 0; font-size: 20px; }
    .section-head p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .summary-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; padding: 20px 24px 24px; }
    .stat-card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 16px; }
    .stat-label { font-size: 12px; color: var(--muted); }
    .stat-value { margin-top: 8px; font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-note { margin-top: 6px; font-size: 12px; color: var(--muted); line-height: 1.6; }
    .table-wrap { padding: 18px 24px 24px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 920px; }
    th, td { padding: 14px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; vertical-align: middle; }
    th { color: var(--muted); font-size: 12px; font-weight: 700; background: #f8fbfa; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #f6fbf8; }
    tbody tr.active { background: #edf7f2; }
    .rate { font-weight: 700; color: var(--text); }
    .muted { color: var(--muted); }
    .analysis { padding: 18px 24px 24px; }
    .analysis p { margin: 0 0 12px; font-size: 14px; line-height: 1.9; color: #33464d; }
    .analysis p:last-child { margin-bottom: 0; }
    .analysis strong { color: var(--text); }
    .analysis-label { color: var(--accent); font-weight: 700; }
    .teacher-panel { padding: 20px 24px 24px; }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr 1.1fr 1fr auto; gap: 12px; align-items: end; }
    .field label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; color: var(--text); }
    .select-wrap { position: relative; }
    .select-wrap::after { content: "▾"; position: absolute; right: 14px; top: 50%; transform: translateY(-40%); color: var(--hero); font-size: 16px; pointer-events: none; }
    select, button { font: inherit; }
    select { width: 100%; appearance: none; border: 1px solid rgba(31,111,99,.14); border-radius: 12px; padding: 12px 38px 12px 14px; background: #fff; color: var(--text); }
    .reset-btn { height: 44px; padding: 0 16px; border: 1px solid rgba(31,111,99,.12); border-radius: 12px; background: #f5faf8; color: var(--hero); cursor: pointer; font-weight: 700; }
    .teacher-card { margin-top: 18px; border: 1px solid var(--line); border-radius: 18px; background: #fbfcfc; padding: 18px; }
    .teacher-top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .teacher-name { font-size: 24px; font-weight: 700; color: var(--text); }
    .teacher-meta { margin-top: 6px; font-size: 13px; color: var(--muted); line-height: 1.7; }
    .teacher-tag { white-space: nowrap; background: #e9f5ef; color: var(--accent); border-radius: 999px; padding: 8px 12px; font-size: 12px; font-weight: 700; }
    .teacher-grid { margin-top: 16px; display: grid; grid-template-columns: minmax(0, 1.02fr) minmax(340px, .98fr); gap: 16px; }
    .panel-card { border: 1px solid var(--line); border-radius: 16px; background: #fff; padding: 16px; }
    .panel-card h3 { margin: 0 0 12px; font-size: 16px; }
    .metric-row { display: grid; grid-template-columns: 170px 1fr 92px; gap: 14px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .metric-row:last-child { border-bottom: none; }
    .metric-name { font-size: 15px; font-weight: 700; }
    .progress { height: 10px; border-radius: 999px; background: var(--track); overflow: hidden; }
    .progress > span { display: block; height: 100%; background: var(--accent); border-radius: inherit; }
    .metric-value { text-align: right; font-size: 14px; font-weight: 700; }
    .reason-block + .reason-block { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
    .reason-title { margin: 0 0 8px; font-size: 15px; font-weight: 700; }
    .ok { color: var(--accent); font-weight: 700; font-size: 13px; }
    ul { margin: 0; padding-left: 18px; color: var(--muted); font-size: 13px; line-height: 1.75; }
    .empty { padding: 36px 16px; text-align: center; color: var(--muted); font-size: 14px; }
    @media (max-width: 1120px) {
      .summary-grid, .filter-row, .teacher-grid { grid-template-columns: 1fr; }
      .hero-top, .teacher-top { flex-direction: column; }
      .pill-row { justify-content: flex-start; }
    }
    @media (max-width: 760px) {
      .wrap { padding: 16px 14px 28px; }
      .hero { padding: 22px 18px; border-radius: 20px; }
      h1 { font-size: 28px; }
      .section-head, .summary-grid, .table-wrap, .analysis, .teacher-panel { padding-left: 16px; padding-right: 16px; }
      .metric-row { grid-template-columns: 1fr; }
      .metric-value { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>台灣老師服務質檢看板</h1>
          <div class="hero-sub" id="heroSub"></div>
        </div>
        <div class="pill-row">
          <div class="pill" id="pillTeachers"></div>
          <div class="pill" id="pillPeriods"></div>
          <div class="pill" id="pillExceptions"></div>
        </div>
      </div>
    </section>
    <section class="section">
      <div class="section-head">
        <h2></h2>
        <p></p>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>月份</th>
              <th>覆蓋周次</th>
              <th>課前預告</th>
              <th>課後圖片</th>
              <th>課後文件</th>
              <th>課後文字</th>
              <th>簽到學員</th>
              <th>異常剔除</th>
            </tr>
          </thead>
          <tbody id="monthTableBody"></tbody>
        </table>
      </div>
    </section>
    <section class="section">
      <div class="section-head">
        <h2>周度情況</h2>
        <p id="weekHeadNote"></p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>周次</th>
              <th>日期範圍</th>
              <th>課前預告</th>
              <th>課後圖片</th>
              <th>課後文件</th>
              <th>課後文字</th>
              <th>簽到學員</th>
              <th>異常剔除</th>
            </tr>
          </thead>
          <tbody id="weekTableBody"></tbody>
        </table>
      </div>
      <div class="analysis" id="analysisBlock"></div>
    </section>
    <section class="section">
      <div class="section-head">
        <h2>老師自查</h2>
        <p>選定月份與周次後，可查看該周老師的具體完成率與未達 100% 的主要原因。</p>
      </div>
      <div class="teacher-panel">
        <div class="filter-row">
          <div class="field">
            <label for="monthSelect">月份</label>
            <div class="select-wrap"><select id="monthSelect"></select></div>
          </div>
          <div class="field">
            <label for="periodSelect">質檢周次</label>
            <div class="select-wrap"><select id="periodSelect"></select></div>
          </div>
          <div class="field">
            <label for="teacherSelect">老師</label>
            <div class="select-wrap"><select id="teacherSelect"></select></div>
          </div>
          <div class="field">
            <label for="focusSelect">快速篩選</label>
            <div class="select-wrap">
              <select id="focusSelect">
                <option value="all">全部老師</option>
                <option value="under_pre">課前預告未滿 100%</option>
                <option value="under_image">課後圖片未滿 100%</option>
                <option value="under_file">課後文件未滿 100%</option>
                <option value="under_text">課後文字未滿 100%</option>
              </select>
            </div>
          </div>
          <button class="reset-btn" id="resetBtn" type="button">重置</button>
        </div>
        <div class="teacher-card" id="teacherCard"></div>
      </div>
    </section>
  </div>

        `<p><span class="analysis-label">異常說明：</span>本月累計剔除 <strong>${num(month.exception_count)}</strong> 條異常記錄，未納入完成率統計。異常主要來自 <strong>LINE 無法匹配學員 ID</strong> 與 <strong>老師身份和實際上課老師不一致</strong> 兩類情況。</p>`,
        `<p><span class="analysis-label">周度變化：</span>${trendText}</p>`,
        `<p><span class="analysis-label">關注重點：</span>從月度均值來看，當前最需要關注的是 <strong>${weakest[0]}</strong>，月度均值為 <strong>${pct(weakest[1])}</strong>。課前高頻問題集中在 <strong>${topIssue(periods, teacher => teacher.pre_reasons)}</strong>；課後文字高頻問題集中在 <strong>${topIssue(periods, teacher => teacher.text_reasons)}</strong>。</p>`,
      ].join("");
    }
    function syncPeriods() {
      const periods = periodsForCurrentMonth();
      periodSelect.innerHTML = periods.map(period => `<option value="${period.key}">${weekLabel(period.key)}｜${period.label}</option>`).join("");
      const hasCurrent = periods.some(period => period.key === periodSelect.value);
      periodSelect.value = hasCurrent ? periodSelect.value : (periods[periods.length - 1]?.key || "");
    }
    function renderTeacherOptions() {
      const teachers = filteredTeachers((currentPeriod().teachers || []).slice().sort((a, b) => String(a.teacher_alias).localeCompare(String(b.teacher_alias))));
      teacherSelect.innerHTML = teachers.map(teacher => `<option value="${teacher.teacher_id}">${teacher.teacher_alias}｜ID ${teacher.teacher_id}</option>`).join("");
      if (!teachers.length) {
        teacherSelect.innerHTML = "";
        return;
      }
      const exists = teachers.some(teacher => teacher.teacher_id === teacherSelect.value);
      teacherSelect.value = exists ? teacherSelect.value : teachers[0].teacher_id;
    }
    function renderTeacherCard() {
      const teachers = filteredTeachers(currentPeriod().teachers || []);
      if (!teachers.length) {
        teacherCard.innerHTML = `<div class="empty">當前篩選條件下沒有老師資料。</div>`;
        return;
      }
      const teacher = teachers.find(item => item.teacher_id === teacherSelect.value) || teachers[0];
      const metrics = [
        { label: "課前預告", rate: teacher.pre_rate, done: teacher.pre_done, denom: teacher.pre_denom },
        { label: "課後圖片", rate: teacher.image_rate, done: teacher.image_done, denom: teacher.image_denom },
        { label: "課後文件", rate: teacher.file_rate, done: teacher.file_done, denom: teacher.file_denom },
        { label: "課後文字", rate: teacher.text_rate, done: teacher.text_done, denom: teacher.text_denom },
      ];
      const reasonSections = [
        { title: "課前預告未命中原因", items: teacher.pre_reasons },
        { title: "課後圖片未命中原因", items: teacher.image_reasons },
        { title: "課後文件未命中原因", items: teacher.file_reasons },
        { title: "課後文字未命中原因", items: teacher.text_reasons },
      ];
      teacherCard.innerHTML = `
        <div class="teacher-top">
          <div>
            <div class="teacher-name">${teacher.teacher_alias}</div>
            <div class="teacher-meta">老師 ID：${teacher.teacher_id}｜簽到學員 ${num(teacher.signed_students)} 人｜請假學員 ${num(teacher.leave_students)} 人｜質檢周次 ${weekLabel(currentPeriod().key)}</div>
          </div>
          <div class="teacher-tag">自查視圖</div>
        </div>
        <div class="teacher-grid">
          <div class="panel-card">
            <h3>完成率明細</h3>
            ${metrics.map(item => `
              <div class="metric-row">
                <div class="metric-name">${item.label}</div>
                <div class="progress"><span style="width:${Math.max(0, Math.min(100, Number(item.rate || 0) * 100))}%"></span></div>
                <div class="metric-value">${pct(item.rate)}<br><span class="muted">${num(item.done)} / ${num(item.denom)}</span></div>
              </div>
            `).join("")}
          </div>
          <div class="panel-card">
            <h3>問題原因</h3>
            ${reasonSections.map(section => `
              <div class="reason-block">
                <div class="reason-title">${section.title}</div>
                ${section.items && section.items.length
                  ? `<ul>${section.items.map(([reason, count]) => `<li>${normalizeReason(reason)}：${num(count)} 人</li>`).join("")}</ul>`
                  : `<div class="ok">本項已完成或暫無異常原因。</div>`}
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }
    function renderAll() {
      renderHero();
      renderMonthSummary();
      renderMonthTable();
      renderWeekTable();
      renderAnalysis();
      renderTeacherOptions();
      renderTeacherCard();
    }
    monthSelect.innerHTML = months.map(month => `<option value="${month.key}">${month.label}</option>`).join("");
    monthSelect.value = months[months.length - 1]?.key || months[0]?.key || "";
    syncPeriods();
    renderAll();
    monthSelect.addEventListener("change", () => { syncPeriods(); renderAll(); });
    periodSelect.addEventListener("change", renderAll);
    focusSelect.addEventListener("change", () => { renderTeacherOptions(); renderTeacherCard(); });
    teacherSelect.addEventListener("change", renderTeacherCard);
    resetBtn.addEventListener("click", () => {
      monthSelect.value = months[months.length - 1]?.key || months[0]?.key || "";
      focusSelect.value = "all";
      syncPeriods();
      renderAll();
    });
  </script>
</body>
</html>
