              }).join('') +
            '</div></div>' +
            '<div class="sop-card"><h3>\u7d50\u8ab2 \u0053\u004f\u0050</h3><p>\u6aa2\u67e5\u8001\u5e2b\u662f\u5426\u5728\u7d50\u8ab2\u5f8c 48 \u5c0f\u6642\u5167\u5b8c\u6210\u7d50\u8ab2\u5bc4\u8a9e\uff0c\u4e26\u5340\u5206\u672a\u5b8c\u6210\u8207\u7570\u5e38\u6a23\u672c\u3002</p><div class="metric-grid">' +
              (selectedMonth.closure_message ? [
                ['\u5b8c\u6210\u7387', formatPct(selectedMonth.closure_message.done_rate), '\u5b8c\u6210 ' + formatInt(selectedMonth.closure_message.done_count) + ' / \u61c9\u5b8c\u6210 ' + formatInt(selectedMonth.closure_message.due_count)],
                ['\u672a\u5b8c\u6210\u6578', formatInt(selectedMonth.closure_message.undone_count), '\u9700\u8981\u4eba\u5de5\u95dc\u6ce8\u7684\u672a\u5b8c\u6210\u540d\u55ae'],
                ['\u7570\u5e38\u6578', formatInt(selectedMonth.closure_message.exception_count), '\u004c\u0049\u004e\u0045 \u7121\u6cd5\u5339\u914d\u6216\u8cc7\u6599\u7570\u5e38\u7684\u6a23\u672c'],
                ['\u7d71\u8a08\u6708\u4efd', selectedMonth.month, '\u7576\u524d\u6708\u5ea6\u532f\u7e3d\u53e3\u5f91'],
              ] : [
                ['\u5b8c\u6210\u7387', '\u66ab\u7121', '\u7576\u524d\u6708\u4efd\u5c1a\u672a\u63a5\u5165\u7d50\u8ab2 \u0053\u004f\u0050'],
                ['\u672a\u5b8c\u6210\u6578', '-', ''],
                ['\u7570\u5e38\u6578', '-', ''],
                ['\u7d71\u8a08\u6708\u4efd', selectedMonth.month, ''],
              ]).map(([label, value, note]) => '<div class="metric-item"><div class="metric-label">' + label + '</div><div class="metric-value">' + value + '</div><div class="metric-note">' + note + '</div></div>').join('') +
            '</div></div>' +
          '</div>' +
        '</section>' +
        '<section class="section">' +
          '<div class="section-head"><h2>\u6708\u5ea6\u5c0d\u6bd4</h2></div>' +
          '<div class="table-wrap"><table><thead><tr><th>\u6708\u4efd</th><th>\u6b63\u8ab2 \u0053\u004f\u0050 \u6307\u6a19</th><th>\u6b63\u8ab2 \u0053\u004f\u0050 \u6a23\u672c</th><th>\u6b63\u8ab2 \u0053\u004f\u0050 \u7570\u5e38</th><th>\u7d50\u8ab2 \u0053\u004f\u0050</th></tr></thead><tbody>' +
            SUMMARY_DATA.monthly.map(monthlyRow).join('') +
          '</tbody></table></div>' +
        '</section>' +
        '<section class="section">' +
          '<div class="section-head"><h2>\u9031\u5ea6\u5c55\u958b</h2><p>\u9078\u5b9a\u6708\u4efd\u5f8c\uff0c\u76f4\u63a5\u5c55\u793a\u8a72\u6708\u4efd\u4e0b\u6240\u6709\u9031\u6b21\u7684\u6b63\u8ab2 \u0053\u004f\u0050 \u8207\u7d50\u8ab2 \u0053\u004f\u0050 \u6982\u6cc1\u3002</p></div>' +
          '<div class="table-wrap"><table><thead><tr><th>\u9031\u6b21</th><th>\u65e5\u671f\u7bc4\u570d</th><th>\u6b63\u8ab2 \u0053\u004f\u0050</th><th>\u6b63\u8ab2 \u0053\u004f\u0050 \u6a23\u672c</th><th>\u6b63\u8ab2 \u0053\u004f\u0050 \u7570\u5e38</th><th>\u7d50\u8ab2 \u0053\u004f\u0050</th></tr></thead><tbody>' +
            weeklyRows.map(weeklyRow).join('') +
          '</tbody></table></div>' +
        '</section>';

      const monthFilter = document.getElementById('monthFilter');
      monthFilter.value = state.month;
      monthFilter.addEventListener('change', () => {
        state.month = monthFilter.value;
        renderSummaryView();
      });
    }

    function renderPlaceholderView(id, title) {
      const view = document.getElementById('view-' + id);
      view.innerHTML = '<section class="section"><div class="section-head"><h2>' + title + '</h2><p>\u9019\u500b SOP \u7684\u5bb9\u5668\u5df2\u7d93\u9810\u7559\u597d\uff0c\u5f8c\u7e8c\u53ea\u8981\u628a\u5c0d\u61c9\u7684\u6708\u9031\u532f\u7e3d\u8cc7\u6599\u548c\u8001\u5e2b\u660e\u7d30\u63a5\u9032\u4f86\uff0c\u5c31\u80fd\u6cbf\u7528\u540c\u4e00\u5957\u5207\u63db\u7d50\u69cb\u3002</p></div><div class="placeholder-grid"><div class="placeholder-card"><h3>\u8cc7\u6599\u5165\u53e3</h3><p>\u63a5\u5165 BI \u5831\u8868\u3001LINE \u5c0d\u8a71\u8cc7\u6599\u8207\u7570\u5e38\u5254\u9664\u898f\u5247\u3002</p></div><div class="placeholder-card"><h3>\u6708\u9031\u532f\u7e3d</h3><p>\u9075\u5faa\u7d71\u4e00\u8cc7\u6599\u7d50\u69cb\uff0c\u81ea\u52d5\u51fa\u73fe\u5728 SOP \u532f\u7e3d\u9801\u8207\u7368\u7acb SOP \u9801\u3002</p></div><div class="placeholder-card"><h3>\u8001\u5e2b\u81ea\u67e5</h3><p>\u4fdd\u7559\u6708\u4efd\u3001\u9031\u6b21\u3001\u8001\u5e2b\u7be9\u9078\uff0c\u7d71\u4e00\u5c55\u793a\u672a\u5b8c\u6210\u8207\u7570\u5e38\u539f\u56e0\u3002</p></div></div></section>';
    }

    function renderViews() {
      document.querySelectorAll('.view').forEach((view) => { view.hidden = true; });
      if (state.current === 'summary') {
        summaryView.hidden = false;
        renderSummaryView();
        return;
      }
      const target = document.getElementById('view-' + state.current);
      target.hidden = false;
      if (state.current === 'four_lesson') renderPlaceholderView('four_lesson', '\u0034\u8ab2\u6642 SOP');
      if (state.current === 'change_teacher') renderPlaceholderView('change_teacher', '\u63db\u5e2b SOP');
      if (state.current === 'new_signup') renderPlaceholderView('new_signup', '\u65b0\u7c3d SOP');
    }

    renderSwitcher();
    renderViews();
  </script>
</body>
</html>
