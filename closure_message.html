<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台灣教學區結課 SOP 看板</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --panel: #ffffff;
      --hero: #1f6f63;
      --hero-soft: #2b8777;
      --text: #173038;
      --muted: #68767c;
      --line: rgba(19, 48, 56, 0.08);
      --soft: #eef4f1;
      --accent: #1d745f;
      --warn: #c56d1f;
      --track: #e8eeeb;
      --shadow: 0 18px 40px rgba(20, 37, 45, 0.06);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei","PingFang SC",sans-serif; color: var(--text); background: var(--bg); }
    .wrap { max-width: 1360px; margin: 0 auto; padding: 24px 20px 40px; }
    .hero { background: linear-gradient(135deg, var(--hero) 0%, var(--hero-soft) 100%); color: #fff; border-radius: 24px; padding: 28px; box-shadow: var(--shadow); }
    .hero-top { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; }
    h1 { margin: 0; font-size: 32px; line-height: 1.15; }
    .hero-sub { margin-top: 10px; font-size: 14px; line-height: 1.7; color: rgba(255,255,255,.88); max-width: 760px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    .pill { border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.12); color: #fff; padding: 10px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; }
    .section { margin-top: 18px; background: var(--panel); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow); }
    .section-head { padding: 22px 24px 0; }
    .section-head h2 { margin: 0; font-size: 20px; }
    .section-head p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .summary-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; padding: 20px 24px 24px; }
    .stat-card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 16px; }
    .stat-label { font-size: 12px; color: var(--muted); }
    .stat-value { margin-top: 8px; font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-note { margin-top: 6px; font-size: 12px; color: var(--muted); line-height: 1.6; }
    .table-wrap { padding: 18px 24px 24px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 920px; }
    th, td { padding: 14px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; vertical-align: middle; }
    th { color: var(--muted); font-size: 12px; font-weight: 700; background: #f8fbfa; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #f6fbf8; }
    tbody tr.active { background: #edf7f2; }
    .rate { font-weight: 700; color: var(--text); }
    .analysis { padding: 18px 24px 24px; }
    .analysis p { margin: 0 0 12px; font-size: 14px; line-height: 1.9; color: #33464d; }
    .analysis p:last-child { margin-bottom: 0; }
    .analysis strong { color: var(--text); }
    .analysis-label { color: var(--accent); font-weight: 700; }
    .teacher-panel { padding: 20px 24px 24px; }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr 1.1fr auto; gap: 12px; align-items: end; }
    .field label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; color: var(--text); }
    .select-wrap { position: relative; }
    .select-wrap::after { content: "▾"; position: absolute; right: 14px; top: 50%; transform: translateY(-40%); color: var(--hero); font-size: 16px; pointer-events: none; }
    select, button { font: inherit; }
    select { width: 100%; appearance: none; border: 1px solid rgba(31,111,99,.14); border-radius: 12px; padding: 12px 38px 12px 14px; background: #fff; color: var(--text); }
    .reset-btn { height: 44px; padding: 0 16px; border: 1px solid rgba(31,111,99,.12); border-radius: 12px; background: #f5faf8; color: var(--hero); cursor: pointer; font-weight: 700; }
    .teacher-card { margin-top: 18px; border: 1px solid var(--line); border-radius: 18px; background: #fbfcfc; padding: 18px; }
    .teacher-top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .teacher-name { font-size: 24px; font-weight: 700; color: var(--text); }
    .teacher-meta { margin-top: 6px; font-size: 13px; color: var(--muted); line-height: 1.7; }
    .teacher-tag { white-space: nowrap; background: #e9f5ef; color: var(--accent); border-radius: 999px; padding: 8px 12px; font-size: 12px; font-weight: 700; }
    .teacher-grid { margin-top: 16px; display: grid; grid-template-columns: minmax(0, 1.02fr) minmax(340px, .98fr); gap: 16px; }
    .panel-card { border: 1px solid var(--line); border-radius: 16px; background: #fff; padding: 16px; }
    .panel-card h3 { margin: 0 0 12px; font-size: 16px; }
    .metric-row { display: grid; grid-template-columns: 170px 1fr 92px; gap: 14px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .metric-row:last-child { border-bottom: none; }
    .metric-name { font-size: 15px; font-weight: 700; }
    .progress { height: 10px; border-radius: 999px; background: var(--track); overflow: hidden; }
    .progress > span { display: block; height: 100%; background: var(--accent); border-radius: inherit; }
    .metric-value { text-align: right; font-size: 14px; font-weight: 700; }
    .reason-block + .reason-block { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
    .reason-title { margin: 0 0 8px; font-size: 15px; font-weight: 700; }
    .ok { color: var(--accent); font-weight: 700; font-size: 13px; }
    .reason-meta { margin-top: 8px; display: grid; gap: 8px; }
    .reason-summary { color: var(--muted); font-size: 13px; }
    .student-list { margin-top: 8px; max-height: 220px; overflow: auto; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; background: #fbfdfc; }
    .student-item { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; line-height: 1.7; color: var(--text); border-bottom: 1px dashed rgba(19,48,56,.08); padding: 6px 0; }
    .student-item:last-child { border-bottom: none; }
    .student-name { font-weight: 700; }
    .student-id { color: var(--muted); white-space: nowrap; }
    ul { margin: 0; padding-left: 18px; color: var(--muted); font-size: 13px; line-height: 1.75; }
    .empty { padding: 36px 16px; text-align: center; color: var(--muted); font-size: 14px; }
    .footer { padding: 0 24px 24px; }
    .footer-box { border-top: 1px solid var(--line); padding-top: 16px; color: var(--muted); font-size: 12px; line-height: 1.8; }
    @media (max-width: 1120px) {
      .summary-grid, .filter-row, .teacher-grid { grid-template-columns: 1fr; }
      .hero-top, .teacher-top { flex-direction: column; }
      .pill-row { justify-content: flex-start; }
    }
    @media (max-width: 760px) {
      .wrap { padding: 16px 14px 28px; }
      .hero { padding: 22px 18px; border-radius: 20px; }
      h1 { font-size: 28px; }
      .section-head, .summary-grid, .table-wrap, .analysis, .teacher-panel { padding-left: 16px; padding-right: 16px; }
      .metric-row { grid-template-columns: 1fr; }
      .metric-value { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>台灣教學區結課 SOP 看板</h1>
          <div class="hero-sub" id="heroSub"></div>
        </div>
        <div class="pill-row">
          <div class="pill" id="pillTeachers"></div>
          <div class="pill" id="pillWeeks"></div>
          <div class="pill" id="pillExceptions"></div>
        </div>
      </div>
    </section>
    <section class="section">
      <div class="section-head">
        <h2>月度匯總</h2>
        <p>以結課日期落在所選月份內、且結課歸屬老師屬於台灣教學服務區的名單為應完成樣本，判斷老師是否於最後一節課後 48 小時內完成結課寄語。</p>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
    </section>
    <section class="section">
      <div class="section-head">
        <h2>週度情況</h2>
        <p>點選週次可直接切換下方老師自查內容。</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>周次</th>
              <th>日期範圍</th>
              <th>應完成數</th>
              <th>已完成數</th>
              <th>未完成數</th>
              <th>異常數</th>
              <th>完成率</th>
            </tr>
          </thead>
          <tbody id="weeklyTableBody"></tbody>
        </table>
      </div>
    </section>
    <section class="section">
      <div class="section-head">
        <h2>看板說明</h2>
      </div>
      <div class="analysis" id="analysisText"></div>
    </section>
    <section class="section">
      <div class="section-head">
        <h2>老師自查</h2>
        <p>先選擇周次，再選擇老師，即可查看該老師於該周的結課 SOP 完成情況、未完成名單與異常名單。</p>
      </div>
      <div class="teacher-panel">
        <div class="filter-row">
          <div class="field">
            <label>月份</label>
            <div class="select-wrap"><select id="monthSelect"></select></div>
          </div>
          <div class="field">
            <label>周次</label>
            <div class="select-wrap"><select id="weekSelect"></select></div>
          </div>
          <div class="field">
            <label>老師</label>
            <div class="select-wrap"><select id="teacherSelect"></select></div>
          </div>
          <button class="reset-btn" id="resetBtn">重設篩選</button>
        </div>
        <div id="teacherCard"></div>
      </div>
    </section>
    <div class="footer">
      <div class="footer-box">口徑說明：完成率 = 已完成數 / 應完成數。異常數目前用於標記 LINE 對話中無法建立有效老師消息關聯的樣本，會與未完成名單分開展示。</div>
    </div>
  </div>

    function updateHero() {
      const totalTeachers = new Set(weeks.flatMap((week) => (week.teachers || []).map((teacher) => teacher.teacher_id))).size;
      const totalExceptions = weeks.reduce((sum, week) => sum + Number(week.exception_count || 0), 0);
      heroSub.textContent = '這份看板承接正課 SOP 的視覺邏輯，專門呈現台灣教學區老師的結課寄語完成情況，方便管理者按週追蹤，也方便老師自行檢查未完成與異常樣本。';
      pillTeachers.textContent = '覆蓋老師 ' + formatInt(totalTeachers) + ' 位';
      pillWeeks.textContent = '覆蓋周次 ' + formatInt(weeks.length) + ' 個';
      pillExceptions.textContent = '異常樣本 ' + formatInt(totalExceptions) + ' 筆';
    }

    function renderSummary() {
      const s = DATA.monthlySummary;
      summaryGrid.innerHTML = [
        ['應完成數', formatInt(s.due_count), '結課日期落在本月且需執行結課 SOP 的學員樣本。'],
        ['已完成數', formatInt(s.done_count), '於課後 48 小時內命中結課寄語的學員數。'],
        ['未完成數', formatInt(s.undone_count), '有對話但未命中完成規則、或超時的樣本。'],
        ['異常數', formatInt(s.exception_count), 'LINE 中未建立有效老師消息關聯的樣本。'],
        ['完成率', formatPct(s.done_rate), '完成率 = 已完成數 / 應完成數。'],
      ].map(([label, value, note]) => '<div class="stat-card"><div class="stat-label">' + label + '</div><div class="stat-value">' + value + '</div><div class="stat-note">' + note + '</div></div>').join('');
    }

    function renderWeeklyTable() {
      weeklyTableBody.innerHTML = selectedWeeks().map((week) => {
        const active = week.week_label === state.weekLabel ? ' class="active"' : '';
        return '<tr data-week="' + week.week_label + '"' + active + '>' +
          '<td>' + week.week_label + '</td>' +
          '<td>' + week.start_date + ' ~ ' + week.end_date + '</td>' +
          '<td>' + formatInt(week.due_count) + '</td>' +
          '<td>' + formatInt(week.done_count) + '</td>' +
          '<td>' + formatInt(week.undone_count) + '</td>' +
          '<td>' + formatInt(week.exception_count) + '</td>' +
          '<td class="rate">' + formatPct(week.done_rate) + '</td>' +
        '</tr>';
      }).join('');
      weeklyTableBody.querySelectorAll('tr').forEach((row) => {
        row.addEventListener('click', () => {
          state.weekLabel = row.dataset.week;
          syncTeacherSelection();
          renderWeeklyTable();
          renderTeacherCard();
        });
      });
    }

    function renderAnalysis() {
      const s = DATA.monthlySummary;
      const topUndone = Object.entries(s.undone_reason_counts || {}).sort((a, b) => b[1] - a[1]).map(([reason, count]) => reason + ' ' + formatInt(count) + ' 筆').join('；') || '本月沒有未完成原因。';
      const topException = Object.entries(s.exception_reason_counts || {}).sort((a, b) => b[1] - a[1]).map(([reason, count]) => reason + ' ' + formatInt(count) + ' 筆').join('；') || '本月沒有異常原因。';
      analysisText.innerHTML =
        '<p><span class="analysis-label">數據口徑：</span>本月結課樣本共 ' + formatInt(s.due_count) + ' 筆，完成率以結課寄語是否在最後一節課後 48 小時內送達為準。</p>' +
        '<p><span class="analysis-label">未完成原因：</span>' + topUndone + '</p>' +
        '<p><span class="analysis-label">異常剔除：</span>' + topException + '</p>';
    }

    function renderMonthOptions() {
      monthSelect.innerHTML = months.map((month) => '<option value="' + month + '">' + month.replace('-', ' 年 ') + ' 月</option>').join('');
      monthSelect.value = state.month;
      monthSelect.addEventListener('change', () => {
        state.month = monthSelect.value;
        state.weekLabel = selectedWeeks()[0]?.week_label || '';
        syncTeacherSelection();
        renderWeekOptions();
        renderWeeklyTable();
        renderTeacherCard();
      });
    }

    function renderWeekOptions() {
      weekSelect.innerHTML = selectedWeeks().map((week) => '<option value="' + week.week_label + '">' + week.week_label + '｜' + week.start_date + ' ~ ' + week.end_date + '</option>').join('');
      weekSelect.value = state.weekLabel;
      weekSelect.onchange = () => {
        state.weekLabel = weekSelect.value;
        syncTeacherSelection();
        renderWeeklyTable();
        renderTeacherCard();
      };
      renderTeacherOptions();
    }

    function renderTeacherOptions() {
      const week = currentWeek();
      const teachers = (week?.teachers || []).slice().sort((a, b) => teacherName(a).localeCompare(teacherName(b), 'zh-Hant'));
      teacherSelect.innerHTML = '<option value="">請選擇老師</option>' + teachers.map((teacher) =>
        '<option value="' + teacher.teacher_id + '">' + esc(teacherName(teacher)) + '｜ID ' + teacher.teacher_id + '</option>'
      ).join('');
      teacherSelect.value = state.teacherId;
      teacherSelect.onchange = () => {
        state.teacherId = teacherSelect.value;
        renderTeacherCard();
      };
    }

    function syncTeacherSelection() {
      const week = currentWeek();
      const ids = new Set((week?.teachers || []).map((teacher) => teacher.teacher_id));
      if (!ids.has(state.teacherId)) {
        state.teacherId = week?.teachers?.[0]?.teacher_id || '';
      }
      renderWeekOptions();
    }

    function reasonList(reasonCounts) {
      const entries = Object.entries(reasonCounts || {}).sort((a, b) => b[1] - a[1]);
      if (!entries.length) return '<div class="ok">本項暫無問題。</div>';
      return '<ul>' + entries.map(([reason, count]) => '<li>' + esc(reason) + '：' + formatInt(count) + ' 筆</li>').join('') + '</ul>';
    }

    function studentList(students) {
      if (!students || !students.length) return '<div class="ok">本項暫無名單。</div>';
      return '<div class="student-list">' + students.map((student) =>
        '<div class="student-item"><div><div class="student-name">' + esc(student.student_name || '未識別姓名') + '</div><div>' + esc(student.reason || '') + '</div></div><div class="student-id">ID ' + esc(student.student_id || '-') + '<br>' + esc(String(student.closure_date || '').slice(0, 16)) + '</div></div>'
      ).join('') + '</div>';
    }

    function renderTeacherCard() {
      const week = currentWeek();
      const teacher = (week?.teachers || []).find((item) => item.teacher_id === state.teacherId);
      if (!teacher) {
        teacherCard.innerHTML = '<div class="empty">當前條件下暫無老師資料。</div>';
        return;
      }
      teacherCard.innerHTML =
        '<div class="teacher-card">' +
          '<div class="teacher-top">' +
            '<div><div class="teacher-name">' + esc(teacherName(teacher)) + '</div><div class="teacher-meta">老師 ID ' + esc(teacher.teacher_id) + ' ｜ 周次 ' + esc(week.week_label) + ' ｜ 日期 ' + esc(week.start_date) + ' ~ ' + esc(week.end_date) + '</div></div>' +
            '<div class="teacher-tag">完成率 ' + formatPct(teacher.done_rate) + '</div>' +
          '</div>' +
          '<div class="teacher-grid">' +
            '<div class="panel-card">' +
              '<h3>完成情況</h3>' +
              '<div class="metric-row"><div class="metric-name">結課寄語</div><div class="progress"><span style="width:' + ((Number(teacher.done_rate) || 0) * 100).toFixed(1) + '%"></span></div><div class="metric-value">' + formatInt(teacher.done_count) + ' / ' + formatInt(teacher.due_count) + '</div></div>' +
              '<div class="metric-row"><div class="metric-name">未完成</div><div class="progress"><span style="width:' + ((teacher.due_count ? teacher.undone_count / teacher.due_count : 0) * 100).toFixed(1) + '%; background:#c56d1f"></span></div><div class="metric-value">' + formatInt(teacher.undone_count) + '</div></div>' +
              '<div class="metric-row"><div class="metric-name">異常</div><div class="progress"><span style="width:' + ((teacher.due_count ? teacher.exception_count / teacher.due_count : 0) * 100).toFixed(1) + '%; background:#8a98a0"></span></div><div class="metric-value">' + formatInt(teacher.exception_count) + '</div></div>' +
            '</div>' +
            '<div class="panel-card">' +
              '<h3>原因與名單</h3>' +
              '<div class="reason-block"><div class="reason-title">未完成原因</div>' + reasonList(teacher.undone_reason_counts) + '<div class="reason-meta">' + studentList(teacher.undone_students) + '</div></div>' +
              '<div class="reason-block"><div class="reason-title">異常原因</div>' + reasonList(teacher.exception_reason_counts) + '<div class="reason-meta">' + studentList(teacher.exception_students) + '</div></div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    function esc(value) {
      return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.month = months[0] || DATA.month;
      state.weekLabel = selectedWeeks()[0]?.week_label || '';
      state.teacherId = '';
      renderMonthOptions();
      syncTeacherSelection();
      renderWeeklyTable();
      renderTeacherCard();
    });

    updateHero();
    renderSummary();
    renderAnalysis();
    renderMonthOptions();
    syncTeacherSelection();
    renderWeeklyTable();
    renderTeacherCard();
  </script>
</body>
</html>
